name: Daily Knowledge OS

on:
  workflow_dispatch:

  schedule:
    # Every day at 02:00 UTC (07:30 IST)
    - cron: "0 2 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Generate today's lesson
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -m knowledge_os

      - name: Commit output
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          git add output state/progress.yaml

          git diff --cached --quiet || (
            git commit -m "Daily Knowledge OS"
            git push
          )
