subject: Microsoft 365 Administrator (MS-102)
version: "1.0"
estimated_lessons: 96
reading_time_per_lesson: 15
goal: >
  Master Microsoft 365 administration from beginner to advanced.
outcomes:
  - Set up and configure a Microsoft 365 tenant aligned to organizational requirements
  - Administer Microsoft Entra ID identities roles and access controls
  - Implement secure authentication MFA SSPR and Conditional Access
  - Configure core services Exchange Online SharePoint OneDrive and Teams
  - Manage licenses groups administrative units and governance policies
  - Deploy and manage devices apps and updates with Intune
  - Implement data protection DLP sensitivity labels and retention
  - Operate advanced security insider risk and eDiscovery capabilities
  - Automate administration with PowerShell and Microsoft Graph
  - Monitor troubleshoot and optimize Microsoft 365 services at scale
  - Design cross tenant collaboration external sharing and multi geo
  - Prepare effectively for the MS-102 certification exam
