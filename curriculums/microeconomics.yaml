subject: microeconomics
version: "1.0"
estimated_lessons: 96
reading_time_per_lesson: 15
goal: >
  Become a person who notice the world examples of microeconomics and apply while building business or taking decisions
outcomes:
  - Identify and interpret microeconomic forces behind everyday choices and market outcomes.
  - Apply marginal analysis and opportunity cost to optimize decisions under constraints.
  - Analyze supply, demand, and elasticity to predict price and quantity changes.
  - Evaluate consumer choice using utility, budget constraints, and behavioral insights.
  - Diagnose firm cost structures and use unit economics to guide business models.
  - Distinguish market structures and design pricing strategies accordingly.
  - Use game theory to anticipate strategic interactions among competitors and partners.
  - Address externalities and public goods with market-based and policy tools.
  - Design incentives and mechanisms under asymmetric information.
  - Implement data-driven pricing, experimentation, and platform strategies ethically.
modules:
