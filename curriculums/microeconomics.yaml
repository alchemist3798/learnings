        title: Introduction to Microeconomics and Everyday Choices
        difficulty: Beginner
        estimated_time: 15
        objectives:
          - Explain what microeconomics studies and why it matters for daily and business decisions.
          - Distinguish positive vs normative analysis with simple examples.
          - Identify decisions involving scarcity and trade-offs in your life or venture.
        mental_models:
          - Scarcity
          - Trade-offs
          - Incentives
        prerequisites: []
        tags:
          - foundations
          - decisions
          - business
        project: false
