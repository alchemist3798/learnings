          - Identify the reader promise and implied contract
          - Analyze simple examples to spot story anatomy
        mental_models:
          - Story-as-Change
          - Hook–Conflict–Resolution
        prerequisites: []
        tags:
          - foundations
          - story-elements
          - beginner
        project: false
      - id: SUBJECT-002
