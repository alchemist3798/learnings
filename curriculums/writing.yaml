subject: fiction-writing
version: "1.0"
estimated_lessons: 96
reading_time_per_lesson: 15
goal: >
  Become a well established story writer, who can immerse his readers onto the world he creates
outcomes:
  - Articulate core story elements and how they interact to produce reader immersion
  - Generate compelling premises and translate them into clear story goals and stakes
  - Craft multi-dimensional characters with distinct voices, needs, and arcs
  - Employ effective point of view, narrative distance, and voice to shape reader experience
  - Design coherent plots and structures that escalate tension and deliver satisfying payoffs
  - Build believable worlds and integrate theme, symbolism, and subtext
  - Write vivid scenes with strong beats, subtext-rich dialogue, and purposeful description
  - Manage pacing, setups/payoffs, and multi-POV or nonlinear narratives
  - Revise at macro and line levels using diagnostic tools and feedback loops
  - Tailor craft choices to genre expectations while maintaining an authentic voice
  - Prepare professional submissions, queries, and author platforms
  - Assemble a polished portfolio ready for publication or further development
modules:
