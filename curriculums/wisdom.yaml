subject: wisdom
version: "1.0"
estimated_lessons: 96
reading_time_per_lesson: 15
goal: >
  become aware of the wisdom and help in building tips to navigate life
outcomes:
  - Distinguish wisdom from knowledge and information.
  - Cultivate reflective practices that improve daily judgment.
  - Recognize core values and align choices with them.
  - Apply clear thinking and core mental models to real problems.
  - Regulate emotions and develop character strengths.
  - Communicate with clarity, empathy, and integrity.
  - Make sound decisions under constraints and uncertainty.
  - Manage risk with buffers, optionality, and feedback loops.
  - Navigate ethical tensions with humility and rigor.
  - Build resilience and learn effectively from failures.
  - Maintain lifelong learning systems and communities of practice.
  - Integrate principles into a coherent approach to a wise life.
