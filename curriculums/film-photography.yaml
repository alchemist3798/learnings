          - Compare film and digital capture at a high level.
          - Identify the parts of a 35mm and 120 film roll.
        mental_models:
          - "light-to-emulsion pipeline"
          - "negative-positive thinking"
        prerequisites: []
        tags:
          - fundamentals
          - film
          - emulsion
          - analog
        project: false
      - id: SUBJECT-002
        title: "Camera Types: SLR, Rangefinder, Point-and-Shoot, TLR"
        difficulty: Beginner
