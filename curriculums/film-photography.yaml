subject: film-photography
version: "1.0"
estimated_lessons: 96
reading_time_per_lesson: 15
goal: >
  become a good film photographer who can develop his whole film
outcomes:
  - Expose consistently in manual mode using metering strategies for varied lighting.
  - Choose appropriate film stocks, lenses, and filters to achieve specific creative intents.
  - Plan shoots, bracket intelligently, and maintain a reliable, organized workflow.
  - Safely mix, handle, and dispose of photographic chemicals and manage darkroom safety.
  - Develop black-and-white, C-41 color negative, and E-6 slide films to repeatable standards.
  - Scan negatives effectively, manage color, and perform non-destructive digital cleanup.
  - Make archival-quality black-and-white darkroom prints and basic RA-4 color prints.
  - Troubleshoot exposure, development, and printing issues using systematic tests.
  - Sequence, present, and archive negatives and prints for longevity and impact.
  - Produce a cohesive body of work from capture through development, print/scan, and presentation.
modules:
  - id: M1
    title: "Foundations of Film Photography"
    lessons:
